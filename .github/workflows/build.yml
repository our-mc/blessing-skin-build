name: Build & Docker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: master
            php-version: '8.1'
          - branch: dev
            php-version: '8.2'
    steps:
      - name: Checkout blessing-skin-server
        uses: actions/checkout@v4
        with:
          repository: 'our-mc/blessing-skin-server'
          ref: ${{ matrix.branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.branch }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.branch }}-

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          yarn install --frozen-lockfile

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build assets
        run: pwsh ./tools/build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blessing-skin-build-${{ matrix.branch }}
          include-hidden-files: true
          path: |
            **
            !.git/**
            !node_modules/**
            !.github/**

  docker:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - branch: master
          - branch: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: blessing-skin-build-${{ matrix.branch }}
          path: ./${{ matrix.branch }}/src

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.branch }}
            type=sha,format=long

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./${{ matrix.branch }}
          file: ./${{ matrix.branch }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max