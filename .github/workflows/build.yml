name: Build Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: master
            php-version: '8.1'
          - branch: dev
            php-version: '8.2'
    steps:
      - name: Checkout blessing-skin-server
        uses: actions/checkout@v4
        with:
          repository: 'our-mc/blessing-skin-server'
          ref: ${{ matrix.branch }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Install Yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Build with PowerShell Core
        run: |
          pwsh ./tools/build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blessing-skin-build-${{ matrix.branch }}
          include-hidden-files: true
          path: |
            **
            !.git/**
            !node_modules/**
            !.github/**

  docker:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - branch: master
          - branch: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: blessing-skin-build-${{ matrix.branch }}
          path: ./${{ matrix.branch }}/src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.branch }}
            type=sha,format=long

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./${{ matrix.branch }}
          file: ./${{ matrix.branch }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max