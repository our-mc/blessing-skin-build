name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build Docker image for'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - dev

jobs:
  build-docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout build repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: blessing-skin-build-${{ github.event.inputs.branch }}
          path: ./${{ github.event.inputs.branch }}/src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ github.event.inputs.branch }}
          file: ./${{ github.event.inputs.branch }}/Dockerfile
          tags: |
            blessing-skin-server:${{ github.event.inputs.branch }}
            blessing-skin-server:${{ github.event.inputs.branch }}-${{ github.sha }}
          push: false
          load: true

      - name: Verify Docker image
        run: |
          docker images | grep blessing-skin-server